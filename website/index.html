      <h1>render-why — Why did my React component re-render?</h1>
      <p>
        <strong>render-why</strong> is a React re-render debugger. Drop the
        <code>useWhyRender()</code> hook into any component and get
        plain-English diagnostics that tell you which prop, hook, or context
        value changed — plus one-line autofix suggestions using
        <code>useMemo</code> and <code>useCallback</code>.
      </p>
      <p>
        A modern, zero-config alternative to
        <em>why-did-you-render</em> (WDYR). Works with React 18, React 19,
        the React Compiler, React Native, and Expo. No Babel plugin, no
        monkey-patching React internals, zero production cost.
      </p>
      <p>
        Install: <code>npm install render-why</code> ·
        <a href="https://www.npmjs.com/package/render-why">View on npm</a> ·
        <a href="https://github.com/Kenildev007/render-why">Source on GitHub</a>
      </p>
      <p>
        Adapters for Redux, Zustand, Jotai, TanStack Query, Valtio, and MobX
        surface wasted re-renders caused by selectors that return new
        references with structurally equal values — the single biggest
        source of unnecessary React re-renders.
